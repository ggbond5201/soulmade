<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>激活记忆 | SOULMADE</title>
    <style>
        :root { --main-color: #1a1a1a; --bg-color: #f4f4f4; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-color); color: var(--main-color); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 90%; max-width: 400px; background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; }
        .slogan { font-size: 12px; color: #888; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #555; }
        input, textarea { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 14px; transition: border 0.3s; background: #fafafa; }
        input:focus, textarea:focus { outline: none; border-color: var(--main-color); background: #fff; }
        button { width: 100%; padding: 15px; background: var(--main-color); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: opacity 0.3s; }
        button:active { opacity: 0.8; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 14px; min-height: 20px; }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">SOULMADE</div>
    <div class="slogan">每一位普通人都是艺术家</div>
    
    <div class="form-group">
        <label>激活码</label>
        <input type="text" id="code" placeholder="输入卡片上的激活码 (如: SM-0001-XXXXX)">
    </div>
    
    <div class="form-group">
        <label>想留下的话</label>
        <textarea id="memory" rows="4" placeholder="写下这一刻的故事..."></textarea>
    </div>
    
    <div class="form-group">
        <label>地点 (可选)</label>
        <input type="text" id="place" placeholder="例如：南昌 · 某某咖啡店">
    </div>

    <button id="submitBtn">保存并生成记忆</button>
    <div id="status"></div>
</div>

<script>
    const API_URL = "https://soulmade-memory.2323371806.workers.dev";
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');

    // 自动获取URL参数中的code
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('code')) {
        document.getElementById('code').value = urlParams.get('code');
    }

    btn.onclick = async () => {
        const code = document.getElementById('code').value.trim();
        const memory = document.getElementById('memory').value.trim();
        const place = document.getElementById('place').value.trim();

        if (!code || !memory) {
            showStatus("请填写激活码和内容", "error");
            return;
        }

        btn.disabled = true;
        btn.innerText = "正在封存记忆...";
        showStatus("");

        try {
            const response = await fetch(`${API_URL}/activate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    code: code,
                    memory: memory,
                    place: place,
                    date: new Date().toLocaleDateString()
                })
            });

            const result = await response.json();

            if (response.ok) {
                showStatus("记忆封存成功！", "success");
                btn.innerText = "激活完成";
                // 3秒后跳转到展示页查看
                setTimeout(() => {
                    // 这里跳转到你之前的展示逻辑，假设路径是 /memory.html?id=SM-0001
                    window.location.href = `/memory.html?id=${result.id}`;
                }, 2000);
            } else {
                showStatus(result.error || "激活码无效或已被使用", "error");
                btn.disabled = false;
                btn.innerText = "重新尝试";
            }
        } catch (err) {
            showStatus("网络错误，请检查网络后重试", "error");
            btn.disabled = false;
            btn.innerText = "重新尝试";
        }
    };

    function showStatus(msg, type) {
        status.innerText = msg;
        status.className = type || "";
    }
</script>

</body>
</html>
