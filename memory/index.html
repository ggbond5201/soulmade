<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOULMADE · A Memory For You</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A96E;
    --gold-light: #E8D5A3;
    --gold-pale: #F5EDD6;
    --cream: #FAF6EF;
    --warm-white: #FFFDF9;
    --text-dark: #2C2417;
    --text-mid: #6B5A3E;
    --text-light: #A89070;
    --blush: #F2D5CC;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(201,169,110,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(242,213,204,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Floating petals */
  .petal {
    position: fixed;
    width: 6px; height: 9px;
    border-radius: 50% 50% 50% 0;
    opacity: 0;
    pointer-events: none;
    z-index: 0;
    animation: floatPetal linear infinite;
  }
  .petal:nth-child(1) { background: rgba(242,213,204,0.6); left: 10%; animation-duration: 14s; animation-delay: 0s; }
  .petal:nth-child(2) { background: rgba(201,169,110,0.4); left: 25%; animation-duration: 18s; animation-delay: 2s; width:4px; height:7px; }
  .petal:nth-child(3) { background: rgba(242,213,204,0.5); left: 50%; animation-duration: 12s; animation-delay: 5s; }
  .petal:nth-child(4) { background: rgba(232,213,163,0.5); left: 70%; animation-duration: 16s; animation-delay: 1s; width:5px; height:8px; }
  .petal:nth-child(5) { background: rgba(242,213,204,0.4); left: 85%; animation-duration: 20s; animation-delay: 7s; }

  @keyframes floatPetal {
    0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(100vh) rotate(360deg) translateX(40px); }
  }

  .wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 80px;
  }

  .brand {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.8s ease both;
  }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .brand-dot {
    display: inline-block;
    width: 3px; height: 3px;
    background: var(--gold);
    border-radius: 50%;
    margin: 0 8px;
    vertical-align: middle;
  }

  /* Loading state */
  .loading {
    text-align: center;
    padding: 80px 24px;
    animation: fadeIn 0.5s ease both;
  }
  .loading-ring {
    width: 40px; height: 40px;
    border: 2px solid var(--gold-pale);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
  }
  .loading p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    color: var(--text-light);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Not found state */
  .not-found {
    text-align: center;
    padding: 60px 24px;
    display: none;
  }
  .not-found h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 300;
    margin-bottom: 12px;
    color: var(--text-dark);
  }
  .not-found p {
    font-size: 14px;
    color: var(--text-light);
    line-height: 1.7;
  }

  /* Memory card */
  .card {
    width: 100%;
    max-width: 380px;
    background: var(--warm-white);
    border-radius: 28px;
    padding: 44px 36px 48px;
    position: relative;
    box-shadow:
      0 2px 8px rgba(44,36,23,0.04),
      0 12px 40px rgba(44,36,23,0.08),
      0 0 0 1px rgba(201,169,110,0.12);
    animation: riseUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    overflow: hidden;
    display: none;
  }
  .card::before {
    content: '✿';
    position: absolute;
    top: 16px; right: 20px;
    font-size: 32px;
    opacity: 0.07;
    color: var(--gold);
    transform: rotate(20deg);
  }
  .card::after {
    content: '✿';
    position: absolute;
    bottom: 16px; left: 20px;
    font-size: 22px;
    opacity: 0.07;
    color: var(--gold);
    transform: rotate(-15deg);
  }

  .serial {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--gold-pale);
    border: 1px solid rgba(201,169,110,0.25);
    border-radius: 20px;
    padding: 4px 12px;
    margin-bottom: 28px;
    animation: fadeIn 0.6s ease 0.6s both;
  }
  .serial-dot {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }
  .serial-text {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-light);
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 10px;
    animation: fadeIn 0.6s ease 0.7s both;
  }

  .message {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    font-style: italic;
    line-height: 1.55;
    color: var(--text-dark);
    margin-bottom: 36px;
    padding-bottom: 32px;
    border-bottom: 1px solid rgba(201,169,110,0.15);
    animation: fadeIn 0.8s ease 0.8s both;
  }
  .message::before {
    content: '\201C';
    font-size: 60px;
    color: var(--gold-light);
    line-height: 0;
    display: block;
    margin-bottom: -12px;
    font-style: normal;
  }

  .details {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 36px;
  }

  .detail-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    animation: fadeIn 0.6s ease both;
  }
  .detail-row:nth-child(1) { animation-delay: 0.9s; }
  .detail-row:nth-child(2) { animation-delay: 1.0s; }
  .detail-row:nth-child(3) { animation-delay: 1.1s; }

  .detail-icon {
    width: 32px; height: 32px;
    background: var(--gold-pale);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
    border: 1px solid rgba(201,169,110,0.2);
  }
  .detail-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 2px;
  }
  .detail-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    color: var(--text-dark);
    line-height: 1.4;
  }

  .heart-divider {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeIn 0.6s ease 1.2s both;
  }
  .heart-divider::before, .heart-divider::after {
    content: '';
    display: inline-block;
    width: 48px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,169,110,0.3));
    vertical-align: middle;
    margin: 0 12px;
  }
  .heart-divider::after {
    background: linear-gradient(90deg, rgba(201,169,110,0.3), transparent);
  }
  .heart-divider span { color: var(--blush); font-size: 16px; vertical-align: middle; }

  .footer-note {
    text-align: center;
    animation: fadeIn 0.6s ease 1.3s both;
  }
  .footer-note p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--text-light);
    line-height: 1.7;
  }
  .made-with {
    margin-top: 16px;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(168,144,112,0.4);
  }

  .bottom-brand {
    margin-top: 40px;
    text-align: center;
    animation: fadeIn 0.6s ease 1.5s both;
  }
  .bottom-brand span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-light);
    opacity: 0.5;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes riseUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>

<div class="wrapper">

  <div class="brand">
    <span class="brand-name">Soulmade</span>
    <span class="brand-dot"></span>
    <span class="brand-name">A Memory For You</span>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="loading-ring"></div>
    <p>Opening your memory...</p >
  </div>

  <!-- Not found -->
  <div class="not-found" id="notFound">
    <h2>Memory Not Found</h2>
    <p>This keychain hasn't been activated yet,<br>or the link may be incorrect.</p >
  </div>

  <!-- Memory card -->
  <div class="card" id="memoryCard">
    <div class="serial">
      <div class="serial-dot"></div>
      <span class="serial-text" id="serialText"></span>
    </div>

    <div class="card-title">A message for you</div>

    <div class="message" id="messageText"></div>

    <div class="details">
      <div class="detail-row">
        <div class="detail-icon">📅</div>
        <div class="detail-content">
          <div class="detail-label">Date</div>
          <div class="detail-value" id="dateText"></div>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-icon">📍</div>
        <div class="detail-content">
          <div class="detail-label">Place</div>
          <div class="detail-value" id="placeText"></div>
        </div>
      </div>
      <div class="detail-row" id="memoryRow">
        <div class="detail-icon">✦</div>
        <div class="detail-content">
          <div class="detail-label">Memory</div>
          <div class="detail-value" id="memoryText"></div>
        </div>
      </div>
    </div>

    <div class="heart-divider"><span>♡</span></div>

    <div class="footer-note">
      <p>This memory was made for you,<br>with love.</p >
      <div class="made-with">Made with love, for you.</div>
    </div>
  </div>

  <div class="bottom-brand">
    <span>Soulmade · soulmade.com</span>
  </div>

</div>

<script>
  const API = "https://soulmade-memory.2323371806.workers.dev";

  // 从URL取得ID，支持 /memory/SM-0001 格式
  function getIdFromUrl() {
    const path = window.location.pathname;
    const parts = path.split('/').filter(Boolean);
    // 找memory后面的部分
    const idx = parts.indexOf('memory');
    if (idx !== -1 && parts[idx + 1]) {
      return parts[idx + 1].toUpperCase();
    }
    // 或者直接用query string ?id=SM-0001
    const params = new URLSearchParams(window.location.search);
    if (params.get('id')) return params.get('id').toUpperCase();
    return null;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    } catch {
      return dateStr;
    }
  }

  async function loadMemory() {
    const id = getIdFromUrl();

    if (!id) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('notFound').style.display = 'block';
      return;
    }

    try {
      const res = await fetch(`${API}/memory/${id}`);
      const data = await res.json();

      document.getElementById('loading').style.display = 'none';

      if (data.error) {
        document.getElementById('notFound').style.display = 'block';
        return;
      }

      // Fill in data
      document.getElementById('serialText').textContent = data.id;
      document.getElementById('messageText').textContent = data.message;
      document.getElementById('dateText').textContent = formatDate(data.date);
      document.getElementById('placeText').textContent = data.place;

      if (data.memory) {
        document.getElementById('memoryText').textContent = data.memory;
      } else {
        document.getElementById('memoryRow').style.display = 'none';
      }

      // Update page title
      document.title = `SOULMADE · ${data.id}`;

      // Show card
      document.getElementById('memoryCard').style.display = 'block';

    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('notFound').style.display = 'block';
    }
  }

  loadMemory();
</script>
</body>
</html>
