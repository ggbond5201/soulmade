<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULMADE | Premium UV Art Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .page-section { display: none; }
        .active-section { display: block; }
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .modal-content { background: white; margin: 5% auto; padding: 40px; border-radius: 24px; max-width: 600px; position: relative; }
    </style>
</head>
<body class="bg-white text-black antialiased font-sans">

    <nav class="sticky top-0 z-[100] bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-5 flex justify-between items-center">
        <div onclick="navigate('home')" class="text-3xl font-black italic cursor-pointer tracking-tighter">SOULMADE</div>
        <div class="flex items-center space-x-10 text-[11px] font-bold uppercase tracking-widest">
            <a onclick="navigate('home')" class="cursor-pointer">Home</a >
            <a onclick="navigate('shop')" class="cursor-pointer">Shop</a >
            <select onchange="changeLang(this.value)" class="bg-gray-100 px-3 py-1 rounded-full text-[10px] outline-none">
                <option value="en">ENGLISH</option>
                <option value="zh">简体中文</option>
            </select>
        </div>
    </nav>

    <main id="home-page" class="page-section active-section">
        <section class="h-[70vh] flex items-center justify-center text-center">
            <div>
                <h1 class="text-8xl font-black mb-8 italic tracking-tighter uppercase" data-i18n="hero_title">SOUL MADE.</h1>
                <button onclick="navigate('shop')" class="bg-black text-white px-12 py-5 rounded-full font-black uppercase text-[10px] tracking-widest hover:scale-105 transition" data-i18n="hero_btn">Shop Collection</button>
            </div>
        </section>
    </main>

    <section id="shop-page" class="page-section py-20 px-8">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-12" id="product-list"></div>
    </section>

    <footer class="bg-black text-white py-24 px-10 mt-20">
        <div class="max-w-7xl mx-auto grid md:grid-cols-3 gap-16 text-[10px] font-bold uppercase tracking-[0.2em] text-gray-500">
            <div class="space-y-4">
                <div class="text-2xl font-black italic text-white">SOULMADE</div>
                <p class="leading-relaxed" data-i18n="footer_desc">Handcrafted UV stickers from Nanchang. International quality, worldwide shipping.</p >
            </div>
            <div class="flex flex-col space-y-4">
                <h4 class="text-white mb-2">Customer Care</h4>
                <button onclick="showModal('shipping')" class="text-left hover:text-white" data-i18n="nav_shipping">Shipping Policy</button>
                <button onclick="showModal('refund')" class="text-left hover:text-white" data-i18n="nav_refund">Return & Refund</button>
                <button onclick="showModal('privacy')" class="text-left hover:text-white" data-i18n="nav_privacy">Privacy Policy</button>
            </div>
            <div class="space-y-4">
                <h4 class="text-white mb-2">Contact</h4>
                <p>Studio: Nanchang, CN</p >
                <p class="text-white font-normal lowercase tracking-normal">business@521danyoo.dpdns.org</p >
            </div>
        </div>
    </footer>

    <div id="modalOverlay" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-2xl">&times;</button>
            <div id="modalBody" class="prose max-w-none"></div>
        </div>
    </div>

    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD"></script>
    <script>
        const translations = {
            en: {
                hero_title: "SOUL MADE.", hero_btn: "Shop Collection",
                footer_desc: "Handcrafted UV stickers from Nanchang. International quality, worldwide shipping.",
                nav_shipping: "Shipping Policy", nav_refund: "Return & Refund", nav_privacy: "Privacy Policy",
                shipping_t: "Logistics", shipping_c: "Ships from Nanchang studio via E-packet. Delivery: 7-15 days.",
                refund_t: "Returns", refund_c: "30-day money-back guarantee for unused items.",
                privacy_t: "Privacy", privacy_c: "We use PayPal for secure payments. No card data is stored."
            },
            zh: {
                hero_title: "灵魂制造.", hero_btn: "开始选购",
                footer_desc: "来自南昌的手工 UV 贴纸。国际品质，全球发货。",
                nav_shipping: "物流信息", nav_refund: "退换货说明", nav_privacy: "隐私政策",
                shipping_t: "物流政策", shipping_c: "从南昌工作室通过国际快邮发货，预计 7-15 天送达。",
                refund_t: "售后政策", refund_c: "未使用商品享受 30 天无理由退换货保障。",
                privacy_t: "数据隐私", privacy_c: "我们使用 PayPal 处理支付。我们不会收集您的信用卡信息。"
            }
        };

        const products = [
            { id: 1, name: "Series 01 Premium", price: "19.90", img: "p1.jpg" },
            { id: 2, name: "Series 02 Gloss", price: "24.90", img: "p2.png" },
            { id: 3, name: "Series 03 Matte", price: "22.00", img: "p3.png" },
            { id: 4, name: "Series 04 Neon", price: "18.00", img: "p4.png" },
            { id: 5, name: "Series 05 Custom", price: "30.00", img: "p5.jpg" },
            { id: 6, name: "Series 06 Limited", price: "25.00", img: "p6.jpg" }
        ];

        let currentLang = 'en';

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div>
                    <div class="aspect-square bg-gray-50 rounded-3xl overflow-hidden mb-6 border border-gray-100">
                        < img src="${p.img}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex justify-between font-black italic uppercase tracking-tighter mb-6">
                        <span>${p.name}</span><span class="text-blue-600">$${p.price}</span>
                    </div>
                    <div id="paypal-btn-${p.id}"></div>
                </div>
            `).join('');

            products.forEach(p => {
                if(window.paypal) {
                    paypal.Buttons({
                        style: { layout: 'vertical', color: 'black', shape: 'pill', height: 40 },
                        createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: p.price } }] })
                    }).render('#paypal-btn-' + p.id);
                }
            });
        }

        function changeLang(val) {
            currentLang = val;
            document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = translations[currentLang][el.getAttribute('data-i18n')]; });
        }

        function navigate(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id + '-page').classList.add('active-section');
        }

        function showModal(type) {
            const t = translations[currentLang];
            const title = t[type + '_t'];
            const content = t[type + '_c'];
            document.getElementById('modalBody').innerHTML = `<h3 class="text-2xl font-black italic mb-4 uppercase">${title}</h3><p class="text-gray-500">${content}</p >`;
            document.getElementById('modalOverlay').style.display = 'block';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

        render();
        changeLang('en');
    </script>
</body>
</html>
