<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOULMADE | Frozen in Time</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    /* 保持你原有的 CSS 变量和样式不变 */
    :root { --cream: #f5f0e8; --ink: #1a1612; --amber: #c8a96e; --mist: #e8e2d8; --deep: #0d0b09; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--cream); color: var(--ink); font-family: 'Cormorant Garamond', serif; line-height: 1.6; overflow-x: hidden; }
    .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; position: relative; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 10vw, 6rem); letter-spacing: 0.5rem; margin-bottom: 1rem; }
    /* 这里是我们要替换的文字区域 */
    .tagline { font-family: 'DM Mono', monospace; font-size: 0.75rem; letter-spacing: 0.3rem; text-transform: uppercase; opacity: 0.7; max-width: 600px; text-align: center; transition: all 0.8s ease; }
    /* 动态内容的特别样式 */
    .memory-text { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; text-transform: none; font-style: italic; color: var(--ink); letter-spacing: 0; margin-bottom: 10px; }
    .memory-meta { font-family: 'DM Mono', monospace; font-size: 10px; opacity: 0.5; }
  </style>
</head>
<body>
  <section class="hero">
    <h1 class="logo">SOULMADE</h1>
    <p class="tagline" id="soul-display">EVERY ORDINARY PERSON IS AN ARTIST</p >
  </section>

  <script>
    (async function() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (!id) return; // 如果没有 ID，保持原样

        const display = document.getElementById('soul-display');
        const API = "https://soulmade-memory.2323371806.workers.dev";

        display.style.opacity = "0.3";
        display.innerText = "RECALLING MOMENT...";

        try {
            const res = await fetch(`${API}/memory/${id}`);
            if (res.ok) {
                const data = await res.json();
                display.style.opacity = "0";
                setTimeout(() => {
                    display.innerHTML = `
                        <div class="memory-text">“ ${data.message} ”</div>
                        <div class="memory-meta">${data.place || ''} &nbsp; ${data.date || ''}</div>
                    `;
                    display.style.opacity = "1";
                }, 500);
            } else {
                display.innerText = "A WAITING SOUL.";
            }
        } catch (e) {
            display.innerText = "LOST IN TRANSLATION.";
        }
    })();
  </script>
</body>
</html>
