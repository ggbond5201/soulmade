<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULMADE | Premium UV Art Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        .page-section { display: none; opacity: 0; transition: opacity 0.5s ease-in-out; }
        .page-section.active { display: block; opacity: 1; }
        .product-card img { transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="bg-[#fafafa] text-gray-900 antialiased font-sans">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-lg border-b border-gray-100 px-6 py-5 flex justify-between items-center">
        <div onclick="navigate('home')" class="text-3xl font-black italic cursor-pointer tracking-tighter">SOULMADE</div>
        <div class="hidden md:flex items-center space-x-12 text-[11px] font-bold uppercase tracking-widest text-gray-500">
            <a onclick="navigate('home')" class="cursor-pointer hover:text-black">Home</a >
            <a onclick="navigate('shop')" class="cursor-pointer hover:text-black">Shop</a >
            <a onclick="navigate('story')" class="cursor-pointer hover:text-black">Story</a >
            <select onchange="changeLang(this.value)" class="bg-gray-50 px-3 py-1 rounded-full text-black outline-none cursor-pointer">
                <option value="en">ENGLISH</option>
                <option value="zh">简体中文</option>
            </select>
        </div>
    </nav>

    <main id="home-sec" class="page-section active">
        <section class="h-[70vh] flex flex-col items-center justify-center text-center px-4">
            <h1 class="text-7xl md:text-9xl font-black mb-10 italic tracking-tighter" data-i18n="hero_t">Soul Made.</h1>
            <button onclick="navigate('shop')" class="bg-black text-white px-12 py-5 rounded-full font-black uppercase text-xs tracking-widest hover:bg-gray-800 transition shadow-xl" data-i18n="hero_b">Explore Drops</button>
        </section>
    </main>

    <section id="shop-sec" class="page-section py-20 px-8">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-5xl font-black italic border-b-2 border-black pb-4 mb-16 uppercase" data-i18n="shop_t">The Drops</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
                <div class="product-card bg-white p-6 rounded-3xl shadow-sm border border-gray-50">
                    <div class="aspect-[4/5] bg-gray-50 rounded-2xl overflow-hidden mb-8">
                        < img src="p1.png" class="w-full h-full object-cover">
                    </div>
                    <div class="flex justify-between font-black italic uppercase text-lg mb-8">
                        <span>Series 01</span><span class="text-blue-600">$19.90</span>
                    </div>
                    <div id="paypal-btn-1"></div>
                </div>
                <div class="product-card bg-white p-6 rounded-3xl shadow-sm border border-gray-50">
                    <div class="aspect-[4/5] bg-gray-50 rounded-2xl overflow-hidden mb-8">
                        < img src="p2.png" class="w-full h-full object-cover">
                    </div>
                    <div class="flex justify-between font-black italic uppercase text-lg mb-8">
                        <span>Series 02</span><span class="text-blue-600">$24.90</span>
                    </div>
                    <div id="paypal-btn-2"></div>
                </div>
                </div>
        </div>
    </section>

    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD"></script>
    <script>
        const prices = { "1": "19.90", "2": "24.90" }; // 根据需要增加 ID 和价格

        function navigate(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id + '-sec').classList.add('active');
            window.scrollTo(0,0);
        }

        // 核心：确保图片和按钮同时加载
        window.onload = function() {
            if(window.paypal) {
                Object.keys(prices).forEach(id => {
                    paypal.Buttons({
                        style: { layout: 'vertical', color: 'black', shape: 'rect', height: 40 },
                        createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: prices[id] } }] })
                    }).render('#paypal-btn-' + id);
                });
            }
        };
    </script>
</body>
</html>
