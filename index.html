<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULMADE | Global Premium UV Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .page-section { display: none; }
        .active-section { display: block; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); }
        .modal-content { background: white; margin: 10vh auto; padding: 40px; border-radius: 24px; max-width: 600px; position: relative; }
        .img-container { background: #f9f9f9; position: relative; padding-top: 125%; overflow: hidden; border-radius: 1.5rem; }
        .img-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .img-container:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="bg-white text-black antialiased">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center">
        <div onclick="navigate('home')" class="text-2xl font-black italic cursor-pointer tracking-tighter">SOULMADE</div>
        <div class="flex items-center space-x-8 text-[11px] font-bold uppercase tracking-widest text-gray-400">
            <a onclick="navigate('home')" class="hover:text-black cursor-pointer" data-i18n="nav_home">Home</a >
            <a onclick="navigate('shop')" class="hover:text-black cursor-pointer" data-i18n="nav_shop">Shop</a >
            <select onchange="changeLang(this.value)" class="bg-gray-100 px-3 py-1 rounded-full outline-none text-black">
                <option value="en">EN</option>
                <option value="zh">中</option>
            </select>
        </div>
    </nav>

    <main id="home-page" class="page-section active-section">
        <section class="min-h-[70vh] flex flex-col items-center justify-center text-center px-6">
            <h1 class="text-7xl md:text-9xl font-black italic tracking-tighter mb-6 uppercase" data-i18n="hero_t">Soul Made.</h1>
            <p class="text-gray-400 max-w-sm mb-10 text-sm font-medium" data-i18n="hero_d">Premium UV DTF Stickers from Nanchang to the World.</p >
            <button onclick="navigate('shop')" class="bg-black text-white px-12 py-4 rounded-full text-[10px] font-bold uppercase tracking-[0.2em] hover:scale-105 transition" data-i18n="hero_b">Shop Drops</button>
        </section>
    </main>

    <section id="shop-page" class="page-section py-20 px-6">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-4xl font-black italic uppercase tracking-tighter border-b-2 border-black pb-4 mb-12" data-i18n="shop_t">The Drops</h2>
            <div id="product-list" class="grid grid-cols-1 md:grid-cols-3 gap-12"></div>
        </div>
    </section>

    <footer class="bg-black text-white py-24 px-8 mt-20">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-16">
            <div class="space-y-4">
                <div class="text-2xl font-black italic tracking-tighter">SOULMADE</div>
                <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest leading-relaxed" data-i18n="foot_d">Handcrafted excellence. Born in Nanchang, shipped worldwide.</p >
            </div>
            <div class="flex flex-col space-y-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">
                <h4 class="text-white mb-2">Policies</h4>
                <button onclick="showModal('shipping')" class="text-left hover:text-white" data-i18n="pol_s">Shipping</button>
                <button onclick="showModal('refund')" class="text-left hover:text-white" data-i18n="pol_r">Returns</button>
                <button onclick="showModal('privacy')" class="text-left hover:text-white" data-i18n="pol_p">Privacy</button>
            </div>
            <div class="space-y-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">
                <h4 class="text-white mb-2">Contact</h4>
                <p class="lowercase tracking-normal">business@521danyoo.dpdns.org</p >
                <p>Nanchang, Jiangxi, CN</p >
            </div>
        </div>
    </footer>

    <div id="modalOverlay" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-2xl">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD"></script>
    <script>
        const trans = {
            en: {
                nav_home: "Home", nav_shop: "Shop", hero_t: "Soul Made.", hero_d: "Premium UV DTF Stickers from Nanchang to the World.", hero_b: "Shop Drops", shop_t: "The Drops",
                foot_d: "Handcrafted excellence. Born in Nanchang, shipped worldwide.", pol_s: "Shipping", pol_r: "Returns", pol_p: "Privacy",
                ship_t: "Logistics", ship_c: "Ships from Nanchang via International E-packet. 7-15 days delivery.",
                ref_t: "Returns", ref_c: "30-day money-back guarantee for unused stickers.",
                priv_t: "Secure Pay", priv_c: "Payments via PayPal. No financial data is stored locally."
            },
            zh: {
                nav_home: "首页", nav_shop: "商店", hero_t: "灵魂制造.", hero_d: "产自南昌，发往全球的高端 UV 贴纸。", hero_b: "立即选购", shop_t: "最新系列",
                foot_d: "精工细作。始于南昌，全球配送。", pol_s: "物流政策", pol_r: "售后退换", pol_p: "隐私保护",
                ship_t: "物流配送", ship_c: "从南昌工作室通过国际快邮发货，预计 7-15 天送达。",
                ref_t: "退换货说明", ref_c: "未使用商品支持 30 天无理由退换货。",
                priv_t: "支付安全", priv_c: "使用 PayPal 加密支付，我们不会收集您的信用卡信息。"
            }
        };

        const products = [
            { id: 1, name: "Series 01 Premium", price: "19.90", img: "p1.png" },
            { id: 2, name: "Series 02 Gloss", price: "24.90", img: "p2.png" },
            { id: 3, name: "Series 03 Matte", price: "22.00", img: "p3.png" },
            { id: 4, name: "Series 04 Neon", price: "18.00", img: "p4.png" },
            { id: 5, name: "Series 05 Custom", price: "30.00", img: "p5.png" },
            { id: 6, name: "Series 06 Limited", price: "25.00", img: "p6.png" }
        ];

        let curLang = 'en';

        function render() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div>
                    <div class="img-container mb-6">
                        < img src="${p.img}" onerror="this.src='${p.img.replace('.png', '.jpg')}'">
                    </div>
                    <div class="flex justify-between items-start mb-6 font-black italic uppercase">
                        <span class="text-lg">${p.name}</span>
                        <span class="text-blue-600">$${p.price}</span>
                    </div>
                    <div id="paypal-btn-${p.id}"></div>
                </div>
            `).join('');

            products.forEach(p => {
                if(window.paypal) {
                    paypal.Buttons({
                        style: { layout: 'vertical', color: 'black', shape: 'pill', height: 40 },
                        createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: p.price } }] })
                    }).render('#paypal-btn-' + p.id);
                }
            });
        }

        function changeLang(val) {
            curLang = val;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerText = trans[curLang][el.getAttribute('data-i18n')];
            });
        }

        function navigate(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id + '-page').classList.add('active-section');
            window.scrollTo(0,0);
        }

        function showModal(type) {
            const t = trans[curLang];
            const title = t[type + '_t'];
            const content = t[type + '_c'];
            document.getElementById('modalBody').innerHTML = `<h3 class="text-3xl font-black italic uppercase mb-4 border-b pb-2">${title}</h3><p class="text-gray-500 font-medium leading-relaxed">${content}</p >`;
            document.getElementById('modalOverlay').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        render();
        changeLang('en');
    </script>
</body>
</html>
