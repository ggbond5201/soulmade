<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULMADE | Premium Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .page-section { display: none; }
        .active-section { display: block; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); }
        .modal-content { background: white; margin: 5% auto; padding: 40px; border-radius: 30px; max-width: 800px; position: relative; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-white text-black antialiased">

    <nav class="sticky top-0 z-[100] bg-white/90 backdrop-blur-md border-b border-gray-100 px-8 py-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div onclick="navigate('home')" class="text-3xl font-black italic cursor-pointer">SOULMADE</div>
            <div class="hidden md:flex items-center space-x-10 text-[11px] font-bold uppercase tracking-widest">
                <a onclick="navigate('home')" class="cursor-pointer hover:text-blue-600" data-i18n="nav_home">Home</a >
                <a onclick="navigate('shop')" class="cursor-pointer hover:text-blue-600" data-i18n="nav_shop">Shop</a >
                <div class="flex items-center border-l pl-6 ml-4">
                    <select onchange="changeLang(this.value)" class="bg-transparent outline-none cursor-pointer font-black text-xs">
                        <option value="en">English</option>
                        <option value="zh">简体中文</option>
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <main id="home-page" class="page-section active-section">
        <section class="h-[80vh] flex items-center justify-center bg-gray-50 text-center px-6">
            <div>
                <h1 class="text-7xl md:text-9xl font-black tracking-tighter mb-8" data-i18n="hero_title">CRAFTING SOULS.</h1>
                <p class="text-gray-400 mb-10 max-w-lg mx-auto font-medium" data-i18n="hero_desc">Original UV stickers from Nanchang to the world.</p >
                <button onclick="navigate('shop')" class="bg-black text-white px-12 py-5 rounded-2xl font-black uppercase text-xs tracking-widest" data-i18n="hero_btn">Shop Now</button>
            </div>
        </section>
    </main>

    <section id="shop-page" class="page-section py-24 px-8">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-16" id="product-grid">
            </div>
    </section>

    <footer class="bg-gray-50 py-20 px-8 border-t border-gray-100">
        <div class="max-w-7xl mx-auto grid md:grid-cols-3 gap-12 text-[11px] font-bold uppercase tracking-widest">
            <div>
                <div class="text-xl font-black italic mb-6">SOULMADE</div>
                <p class="text-gray-400 leading-loose" data-i18n="footer_desc">Handcrafted in Nanchang, China.</p >
            </div>
            <div class="space-y-4">
                <p class="text-gray-300">Policy</p >
                <button onclick="showModal('shipping')" class="block hover:text-blue-600" data-i18n="nav_shipping">Shipping</button>
                <button onclick="showModal('refund')" class="block hover:text-blue-600" data-i18n="nav_refund">Returns</button>
            </div>
            <div class="space-y-4">
                <p class="text-gray-300">Contact</p >
                <button onclick="showModal('contact')" class="block hover:text-blue-600" data-i18n="nav_contact">Contact Us</button>
            </div>
        </div>
    </footer>

    <div id="modalOverlay" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-8 right-8 text-2xl">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://www.paypal.com/sdk/js?client-id=test&currency=USD"></script>
    <script>
        const translations = {
            en: {
                nav_home: "Home", nav_shop: "Shop", hero_title: "CRAFTING SOULS.", hero_btn: "Shop Now",
                nav_shipping: "Shipping Policy", nav_refund: "Return Policy", nav_contact: "Contact Us",
                shipping_title: "Shipping Policy", shipping_content: "All orders are processed within 3 days. International shipping takes 7-15 days.",
                refund_title: "Return Policy", refund_content: "We offer a 30-day money-back guarantee for unused items.",
                contact_title: "Contact", contact_content: "Email: business@521danyoo.dpdns.org"
            },
            zh: {
                nav_home: "首页", nav_shop: "商店", hero_title: "灵魂铸造.", hero_btn: "立即选购",
                nav_shipping: "物流政策", nav_refund: "退换货政策", nav_contact: "联系我们",
                shipping_title: "物流政策", shipping_content: "所有订单在3天内发货。国际物流通常需要7-15个工作日送达。",
                refund_title: "退换货政策", refund_content: "我们为未使用、包装完整的商品提供30天退换货保证。",
                contact_title: "联系我们", contact_content: "电子邮箱：business@521danyoo.dpdns.org"
            }
        };

        let currentLang = 'en';
        const products = [
            {id: 1, name: "Soul-01 Classic", price: "19.90", img: "https://images.unsplash.com/photo-1633419461186-7d40a38105ec?w=800"},
            {id: 2, name: "Cyber Gloss", price: "24.90", img: "https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=800"},
            {id: 3, name: "Matte Art", price: "22.00", img: "https://images.unsplash.com/photo-1576158113928-4c240eaaf360?w=800"}
        ];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="aspect-square bg-gray-100 rounded-3xl overflow-hidden mb-6">
                        < img src="${p.img}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex justify-between items-center px-2 mb-6 font-black italic uppercase">
                        <span>${p.name}</span><span>$${p.price}</span>
                    </div>
                    <div id="paypal-btn-${p.id}"></div>
                </div>
            `).join('');

            products.forEach(p => {
                if(window.paypal) {
                    paypal.Buttons({
                        style: { layout: 'vertical', color: 'black', shape: 'pill' },
                        createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: p.price } }] })
                    }).render(`#paypal-btn-${p.id}`);
                }
            });
        }

        function changeLang(val) {
            currentLang = val;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(translations[currentLang][key]) el.innerHTML = translations[currentLang][key];
            });
        }

        function navigate(id) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-section'));
            document.getElementById(id + '-page').classList.add('active-section');
        }

        function showModal(type) {
            const title = translations[currentLang][type + '_title'];
            const content = translations[currentLang][type + '_content'];
            document.getElementById('modalBody').innerHTML = `<h2 class="text-4xl font-black italic mb-6">${title}</h2><p class="text-gray-500 font-medium">${content}</p >`;
            document.getElementById('modalOverlay').style.display = 'block';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

        // 初始化
        renderProducts();
        changeLang('en');
    </script>
</body>
</html>
